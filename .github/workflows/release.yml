name: RotoDex Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Release Version
      id: set_version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
        } else {
          echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_ENV
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Publish RotoDex Desktop
      run: dotnet publish src/RotoDex.Desktop/RotoDex.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/RotoDex

    - name: Archive Release
      shell: pwsh
      run: Compress-Archive -Path publish/RotoDex -DestinationPath RotoDex-Desktop-win-x64.zip

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        files: RotoDex-Desktop-win-x64.zip
        generate_release_notes: true
